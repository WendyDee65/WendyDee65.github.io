<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">
    <img src="images/VineInLine.png" alt="Logo">
    <span>Vine In Line</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="news.html">Current News</a>
    <a href="schedule.html">Schedule</a>
    <a href="ListOfDances.html">List of Dances</a>
    <a href="events.html">Events</a>
    <a href="other_resources.html">Other Resources</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="section">
  <h1>Events</h1>
  <p>
    Upcoming line dance socials, workshops, group outings, festivals, and special dance opportunities.
  </p>
</section>

<section class="section alt">
  <div id="eventsContainer" class="events-list"></div>
</section>

<footer>
  <p>Vine In Line | SLO North County, CA</p>
</footer>

<script src="events.js"></script>

<script>
  const eventsContainer = document.getElementById("eventsContainer");

  eventsContainer.innerHTML = events.map(event => `
    <div class="event-agenda-item">

      <div class="event-agenda-date">
        📅 ${event.date}
      </div>

      <h2>
        ${event.link
          ? `<a href="${event.link}" target="_blank" rel="noopener noreferrer">${event.title}</a>`
          : event.title}
      </h2>

      <div class="event-agenda-meta">
        ${event.type ? `<span>${event.type}</span>` : ""}
        ${event.location ? `<span>📍 ${event.location}</span>` : ""}
      </div>

    </div>
  `).join("");
</script>

</body>
</html>
