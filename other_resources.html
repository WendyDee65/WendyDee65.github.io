<section class="section alt">
  <div id="resourcesContainer"></div>
</section>

<footer>
  <p>Vine In Line | SLO North County, CA</p>
</footer>

<script src="other_resources.js"></script>

<script>
  const resourcesContainer = document.getElementById("resourcesContainer");

  resourcesContainer.innerHTML = resourceSections.map((section, index) => `
    <section class="resource-section ${index % 2 === 0 ? 'resource-light' : 'resource-alt'}">
      <h2>${section.title}</h2>

      <div class="resource-grid">
        ${section.resources.map(resource => `
          <div class="resource-card">
            <h3>
              ${resource.link
                ? `<a href="${resource.link}" target="_blank" rel="noopener noreferrer">${resource.title}</a>`
                : resource.title}
            </h3>
            <p>${resource.description}</p>
          </div>
        `).join("")}
      </div>
    </section>
  `).join("");
</script>
