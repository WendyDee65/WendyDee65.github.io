<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current News</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">
    <img src="images/VineInLine.png" alt="Logo">
    <span>Vine In Line</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="news.html">Current News</a>
    <a href="schedule.html">Schedule</a>
    <a href="ListOfDances.html">List of Dances</a>
    <a href="events.html">Events</a>
    <a href="other_resources.html">Other Resources</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="section">
  <h1>Current News</h1>
  <p>
    Monthly updates, schedule notes, featured dances, and announcements for Vine In Line dancers.
  </p>
</section>

<section class="section alt">
  <div id="newsContainer"></div>
</section>

<footer>
  <p>Vine In Line | SLO North County, CA</p>
</footer>
<script src="news.js"></script>

<script>
  const newsContainer = document.getElementById("newsContainer");

  function danceLinks(dance) {
    return `
      ${dance.stepsheet ? `<a href="${dance.stepsheet}" target="_blank" rel="noopener noreferrer">📄 Stepsheet</a>` : ""}
      ${dance.demo ? `<a href="${dance.demo}" target="_blank" rel="noopener noreferrer">▶ Demo</a>` : ""}
      ${dance.tutorial ? `<a href="${dance.tutorial}" target="_blank" rel="noopener noreferrer">🎓 Tutorial</a>` : ""}
    `;
  }

  newsContainer.innerHTML = `
    <div class="card news-card">
      <h2>🍇 ${news.month} Updates</h2>

      <h3>Current Schedule Updates</h3>
      <ul>
        ${news.scheduleUpdates.map(item => `<li>${item}</li>`).join("")}
      </ul>

      <h3>Field Trip Opportunities</h3>
      ${news.fieldTrips.map(trip => `
        <div class="news-dance-item">
          <h4>${trip.title}</h4>
          <p>${trip.description}</p>
          ${trip.link ? `<a href="${trip.link}" target="_blank" rel="noopener noreferrer">${trip.linkText}</a>` : ""}
        </div>
      `).join("")}
    </div>

    <div class="card news-card">
      <h2>💃 Featured Beginner Hour Dances</h2>
      <h3>${news.beginnerHour.title}</h3>

      <div class="news-dance-list">
        ${news.beginnerHour.dances.map(dance => `
          <div class="news-dance-item">
            <h4>${dance.name}</h4>
            <p><strong>Level:</strong> ${dance.level}</p>
            <p>${danceLinks(dance)}</p>
          </div>
        `).join("")}
      </div>

      ${news.beginnerHour.justDance && news.beginnerHour.justDance.length > 0 ? `
        <h3>Just Dance Selections</h3>
        <div class="news-dance-list">
          ${news.beginnerHour.justDance.map(dance => `
            <div class="news-dance-item">
              <h4>${dance.name}</h4>
              <p>${danceLinks(dance)}</p>
            </div>
          `).join("")}
        </div>
      ` : ""}
    </div>

    <div class="card news-card">
      <h2>🎵 Featured Improver Hour Dances</h2>
      <h3>${news.improverHour.title}</h3>

      <div class="news-dance-list">
        ${news.improverHour.dances.map(dance => `
          <div class="news-dance-item">
            <h4>${dance.name}</h4>
            <p><strong>Level:</strong> ${dance.level}</p>
            <p>${danceLinks(dance)}</p>
          </div>
        `).join("")}
      </div>
    </div>
  `;
</script>

</body>
</html>
